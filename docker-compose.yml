version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: carguru_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./carguru-backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./carguru-backend
      dockerfile: Dockerfile
    container_name: carguru_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POOL_MAX: 10
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT},https://carguru-frontend.vercel.app
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:${BACKEND_PORT}/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./carguru-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_ELEVEN_LABS_AGENT_ID: ${NEXT_PUBLIC_ELEVEN_LABS_AGENT_ID}
        NEXT_PUBLIC_TELEGRAM_API_URL: ${NEXT_PUBLIC_TELEGRAM_API_URL}
    container_name: carguru_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_ELEVEN_LABS_AGENT_ID: ${NEXT_PUBLIC_ELEVEN_LABS_AGENT_ID}
      NEXT_PUBLIC_TELEGRAM_API_URL: ${NEXT_PUBLIC_TELEGRAM_API_URL}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"

volumes:
  postgres_data:
